<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>

<div class="navbar bg-dark flex-box align-items-center justify-content-between p-3">
    <h5 class="text-white fw-bold m-0">CourseShare</h5>
    <div class="nav text-gray">
        <a class="nav-link" th:href="@{/course}">Home</a>
        <a class="nav-link" th:href="@{/category}">Categories</a>
        <a class="nav-link" th:href="@{/review}">Recent Reviews</a>
        <a class="nav-link" th:href="@{/instructor}">Login</a>
    </div>
</div>

<main class="container p-3 d-flex justify-content-center align-items-center">

    <div class="w-50 h-50 bg-white rounded p-3 shadow-lg">
        <h2 class="text-center">Instructor Login</h2>
        <form th:action="@{/instructor/login}" th:object="${instructor}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Enter username">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>

</main>
</body>
</html>
