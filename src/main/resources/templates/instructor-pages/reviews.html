<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>

<div th:replace="~{fragments/instructor-navbar :: instructor-navbar}"></div>

<main class="container p-3">
    <h2>Pending Reviews</h2>
    <hr>
    <div class="bg-white w-100 p-3 mb-3 rounded border-start border-primary border-4" th:each="pending : ${manageReviewsResponse.pending}">
        <h5 th:text="${'Course: ' + pending.course.title}"></h5>
        <h5 th:text="${'Reviewer: ' + pending.authorName}"></h5>
        <span class="text-warning" th:each="i : ${#numbers.sequence(1,5)}">
            <span th:if="${i <= pending.rating}">&starf;</span>
            <span th:if="${i > pending.rating}">&star;</span>
        </span>
        <p th:text="${pending.content}"></p>
        <div class="d-flex gap-2">
            <form th:action="@{/instructor/reviews/{id}/approve(id=${pending.id})}" th:method="patch">
                <button type="submit" class="btn btn-success">Approve</button>
            </form>
            <form th:action="@{/instructor/reviews/{id}(id=${pending.id})}" th:method="delete">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>

    <h2>Approved Reviews</h2>
    <hr>
    <div class="bg-white w-100 p-3 mb-3 rounded border-start border-primary border-4" th:each="approve : ${manageReviewsResponse.approved}">
        <h5 th:text="${'Course: ' + approve.course.title}"></h5>
        <h5 th:text="${'Reviewer: ' + approve.authorName}"></h5>
        <span class="text-warning" th:each="i : ${#numbers.sequence(1,5)}">
            <span th:if="${i <= approve.rating}">&starf;</span>
            <span th:if="${i > approve.rating}">&star;</span>
        </span>
        <p th:text="${approve.content}"></p>
        <div class="d-flex gap-2">
            <form th:action="@{/instructor/reviews/{id}(id=${approve.id})}" th:method="delete">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>

</main>
</body>
</html>
