<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
<!-- Navbar-->
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!--Main Content-->

<main class="container p-3" th:with="course=${courseDetailResponse.course}">
    <h2 th:text="*{course.title}"></h2>

    <div class="d-flex align-items-center justify-content-start">
        <p class="me-2">Categories:</p>
        <div th:each="category : ${course.category.split(',')}">
            <p class="me-2" th:text="*{category}"></p>
        </div>
    </div>
    <p th:text="*{course.description}"></p>

    <div class="course-card p-3 mb-3 rounded w-50 border-1">
        <h3>Course Content</h3>
        <div id="markdown-content"></div>
    </div>

    <h3>Student Reviews</h3>
    <div class="border-4 border-start border-primary p-2 mb-3" th:each="review : ${courseDetailResponse.reviews}">
        <h5 th:text="*{review.authorName}"></h5>
        <span class="text-warning" th:each="i : ${#numbers.sequence(1,5)}">
            <span th:if="${i <= review.rating}">&starf;</span>
            <span th:if="${i > review.rating}">&star;</span>
        </span>
        <p th:text="*{review.content}"></p>

    </div>

    <h3>Add Your Review</h3>
    <!-- form bắt buộc dùng th:object, k dùng th:with   -->
    <form th:action="@{/reviews}" th:object="${reviewRequest}" method="post" novalidate>

        <input type="hidden" id="courseId" name="courseId" th:value="${course.id}">
        <div class="mb-3">
            <label for="authorName" class="form-label">Your Name</label>
            <input type="text" class="form-control" id="authorName" name="authorName"
                   th:field="*{authorName}" th:classappend="${#fields.hasErrors('authorName') ? 'is-invalid' : ''}" required>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('authorName')}" th:errors="*{authorName}"></div>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   th:field="*{email}" th:classappend="${#fields.hasErrors('email') ? 'is-invalid' : ''}" required>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="mb-3">
            <label for="rating" class="form-label">Rating</label>
            <select class="form-select" id="rating" name="rating"
                    th:field="*{rating}" th:classappend="${#fields.hasErrors('rating') ? 'is-invalid' : ''}" required>
                <option value="" disabled selected>Select your rating</option>
                <option value="1">&starf;</option>
                <option value="2">&starf; &starf;</option>
                <option value="3">&starf; &starf; &starf;</option>
                <option value="4">&starf; &starf; &starf; &starf;</option>
                <option value="5">&starf; &starf; &starf; &starf; &starf;</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></div>
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">Review Content</label>
            <textarea class="form-control" id="content" name="content" rows="3"
                      th:field="*{content}" th:classappend="${#fields.hasErrors('content') ? 'is-invalid' : ''}"  required></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Submit Review</button>

    </form>
</main>

</body>
</html>
