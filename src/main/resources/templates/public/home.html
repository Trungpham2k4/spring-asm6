<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<!-- Navbar-->
    <div th:replace="~{fragments/navbar :: navbar}"></div>
<!--Main Content-->

    <main class="container p-3">
        <h2>Recent published courses</h2>


        <div class="course-card p-3 mb-3 rounded w-50 border-1" th:each="course : ${homepage.courses}">
            <h3 th:text="*{course.title}"></h3>
            <p th:text="*{course.description}"></p>
            <p th:text="*{course.category}"></p>
            <a class="btn btn-primary" th:href="@{/courses/{id}(id=${course.id})}">View Details</a>
        </div>


        <nav th:if="${homepage.courses.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/courses(page=${currentPage - 1})}">Previous</a>
                </li>

                <!-- Vòng lặp in ra các số trang (1, 2, 3...) -->
                <!-- #numbers.sequence(1, totalPages) tạo ra một mảng từ 1 đến tổng số trang -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(1, homepage.courses.totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">

                    <a class="page-link" th:href="@{/courses(page=${i})}" th:text="${i}">1</a>
                </li>

                <!-- Nút "Trang sau" (Next) -->
                <!-- Thêm class 'disabled' nếu đang ở trang cuối cùng -->
                <li class="page-item" th:classappend="${currentPage == homepage.courses.totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/courses(page=${currentPage + 1})}">Next</a>
                </li>
            </ul>
        </nav>

        <div class="other-card rounded border-1 mb-3">
            <div class="bg-secondary p-3 rounded-top-1">
                <h5 class="text-white m-0">Categories</h5>
            </div>
            <div class="p-3 d-flex align-items-center justify-content-start gap-2">
                <span th:each="category : ${homepage.categories}">
                    <span th:text="*{category.name}"></span>
                </span>
            </div>
        </div>

        <div class="other-card rounded border-1">
            <div class="bg-secondary p-3 rounded-top-1">
                <h5 class="text-white m-0">Recent reviews</h5>
            </div>
            <div class="p-3 flex-box align-items-center justify-content-start">
                <div class="mb-2" th:each="review : ${homepage.reviews}">
                    <h6 class="m-1" th:text="*{review.authorName}"></h6>
                    <span class="text-warning" th:each="i : ${#numbers.sequence(1,5)}">
                        <span th:if="${i <= review.rating}">&starf;</span>
                        <span th:if="${i > review.rating}">&star;</span>
                    </span>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
