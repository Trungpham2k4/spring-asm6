<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recent Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
<!-- Navbar-->
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!--Main Content-->

<main class="container p-3">
    <h2>Most Recent Reviews</h2>
    <hr>
    <div class="border-4 border-start border-primary p-2 mb-3" th:each="review : ${reviews}">
        <h4 th:text="${review.course.title}"></h4>
        <h5 th:text="${review.authorName}"></h5>
        <span class="text-warning" th:each="i : ${#numbers.sequence(1,5)}">
            <span th:if="${i <= review.rating}">&starf;</span>
            <span th:if="${i > review.rating}">&star;</span>
        </span>
        <p class="mb-0" th:text="${review.content}"></p>
    </div>

</main>

</body>
</html>
