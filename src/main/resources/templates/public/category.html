<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
<!-- Navbar-->
<div class="navbar bg-dark flex-box align-items-center justify-content-between p-3">
    <h5 class="text-white fw-bold m-0">CourseShare</h5>
    <div class="nav text-gray">
        <a class="nav-link" th:href="@{/course}">Home</a>
        <a class="nav-link" th:href="@{/category}">Categories</a>
        <a class="nav-link" th:href="@{/review}">Recent Reviews</a>
        <a class="nav-link" th:href="@{/instructor/login}">Login</a>
    </div>
</div>
<!--Main Content-->

<main class="container p-3">
    <h2>Category Cloud</h2>
    <div class="bg-white rounded d-flex align-items-center justify-content-start p-3 mb-4 gap-2 flex-wrap">
        <div th:each="category : ${categoryPageResponse.categories}">
            <a class="text-decoration-none text-primary"
               th:href="@{/category(name=${category.name})}"
               th:text="${category.name}"
            ></a>
        </div>
    </div>

    <!-- Đổi th:if thành th:text -->
    <h2 class="mb-3" th:text="${categoryName.isEmpty() ? 'All courses' : ('Courses in category: ' + categoryName)}"></h2>
    <div class="course-card p-3 mb-3 rounded w-50 border-1" th:each="course : ${categoryPageResponse.courses}">
        <h3 th:text="${course.title}"></h3>
        <p th:text="${course.description}"></p>

        <a class="btn btn-primary" th:href="@{/course/{id}(id=${course.id})}">View Course</a>
    </div>

    <nav th:if="${categoryPageResponse.courses.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/category(name=${categoryName},page=${currentPage - 1})}">Previous</a>
            </li>

            <!-- Vòng lặp in ra các số trang (1, 2, 3...) -->
            <!-- #numbers.sequence(1, totalPages) tạo ra một mảng từ 1 đến tổng số trang -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(1, categoryPageResponse.courses.totalPages)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link" th:href="@{/category(name=${categoryName},page=${i})}" th:text="${i}">1</a>
            </li>

            <!-- Nút "Trang sau" (Next) -->
            <!-- Thêm class 'disabled' nếu đang ở trang cuối cùng -->
            <li class="page-item" th:classappend="${currentPage == categoryPageResponse.courses.totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/category(name=${categoryName},page=${currentPage + 1})}">Next</a>
            </li>
        </ul>
    </nav>

</main>

</body>
</html>
